<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eisenhower Matrix</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --text: #e2e2ef;
    --text-dim: #6e6e8a;
    --accent: #7c5cfc;
    --do: #ff4d6a;
    --do-bg: rgba(255, 77, 106, 0.06);
    --do-border: rgba(255, 77, 106, 0.15);
    --schedule: #ffb347;
    --schedule-bg: rgba(255, 179, 71, 0.06);
    --schedule-border: rgba(255, 179, 71, 0.15);
    --delegate: #4dc9f6;
    --delegate-bg: rgba(77, 201, 246, 0.06);
    --delegate-border: rgba(77, 201, 246, 0.15);
    --eliminate: #6e6e8a;
    --eliminate-bg: rgba(110, 110, 138, 0.06);
    --eliminate-border: rgba(110, 110, 138, 0.15);
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Ambient background glow */
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(124, 92, 252, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(255, 77, 106, 0.02) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 24px 20px; }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-icon {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--do));
    border-radius: 12px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 3px;
    padding: 8px;
    box-shadow: 0 4px 20px rgba(124, 92, 252, 0.3);
  }

  .logo-icon span {
    background: rgba(255,255,255,0.9);
    border-radius: 2px;
  }

  h1 {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--text), var(--text-dim));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header-stats {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .stat {
    text-align: center;
  }

  .stat-value {
    font-size: 24px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    font-weight: 600;
  }

  .streak-flame {
    display: inline-block;
    animation: flicker 1.5s ease-in-out infinite alternate;
  }

  @keyframes flicker {
    0% { transform: scale(1); filter: brightness(1); }
    100% { transform: scale(1.15); filter: brightness(1.3); }
  }

  /* Actions bar */
  .actions {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .btn {
    padding: 8px 16px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    border-radius: 10px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn:hover {
    border-color: var(--accent);
    background: rgba(124, 92, 252, 0.08);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(124, 92, 252, 0.15);
  }

  .btn:active { transform: translateY(0); }

  .btn-danger:hover {
    border-color: var(--do);
    background: rgba(255, 77, 106, 0.08);
    box-shadow: 0 4px 12px rgba(255, 77, 106, 0.15);
  }

  .btn svg { width: 14px; height: 14px; }

  /* Grid */
  .matrix {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 12px;
  }

  /* Axis labels */
  .axis-labels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 6px;
  }

  .axis-label {
    text-align: center;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
    font-weight: 700;
  }

  .y-axis {
    position: absolute;
    left: -10px;
    top: 50%;
    transform: translateY(-50%) rotate(-90deg);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
    font-weight: 700;
    white-space: nowrap;
    pointer-events: none;
    display: none;
  }

  /* Quadrant */
  .quadrant {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    min-height: 220px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
  }

  .quadrant::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    border-radius: 16px 16px 0 0;
    opacity: 0.8;
  }

  .quadrant[data-quadrant="do"]::before { background: linear-gradient(90deg, var(--do), transparent); }
  .quadrant[data-quadrant="schedule"]::before { background: linear-gradient(90deg, var(--schedule), transparent); }
  .quadrant[data-quadrant="delegate"]::before { background: linear-gradient(90deg, var(--delegate), transparent); }
  .quadrant[data-quadrant="eliminate"]::before { background: linear-gradient(90deg, var(--eliminate), transparent); }

  .quadrant[data-quadrant="do"] { border-color: var(--do-border); background: var(--do-bg); }
  .quadrant[data-quadrant="schedule"] { border-color: var(--schedule-border); background: var(--schedule-bg); }
  .quadrant[data-quadrant="delegate"] { border-color: var(--delegate-border); background: var(--delegate-bg); }
  .quadrant[data-quadrant="eliminate"] { border-color: var(--eliminate-border); background: var(--eliminate-bg); }

  .quadrant.drag-over {
    transform: scale(1.01);
    box-shadow: 0 0 30px rgba(124, 92, 252, 0.15);
  }

  .quadrant[data-quadrant="do"].drag-over { box-shadow: 0 0 30px rgba(255, 77, 106, 0.2); border-color: var(--do); }
  .quadrant[data-quadrant="schedule"].drag-over { box-shadow: 0 0 30px rgba(255, 179, 71, 0.2); border-color: var(--schedule); }
  .quadrant[data-quadrant="delegate"].drag-over { box-shadow: 0 0 30px rgba(77, 201, 246, 0.2); border-color: var(--delegate); }
  .quadrant[data-quadrant="eliminate"].drag-over { box-shadow: 0 0 30px rgba(110, 110, 138, 0.2); border-color: var(--eliminate); }

  .quadrant-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .quadrant-title {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .quadrant-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    animation: pulse-dot 3s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.3); }
  }

  .quadrant[data-quadrant="do"] .quadrant-dot { background: var(--do); box-shadow: 0 0 8px var(--do); }
  .quadrant[data-quadrant="schedule"] .quadrant-dot { background: var(--schedule); box-shadow: 0 0 8px var(--schedule); }
  .quadrant[data-quadrant="delegate"] .quadrant-dot { background: var(--delegate); box-shadow: 0 0 8px var(--delegate); }
  .quadrant[data-quadrant="eliminate"] .quadrant-dot { background: var(--eliminate); box-shadow: 0 0 8px var(--eliminate); }

  .quadrant-name {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .quadrant[data-quadrant="do"] .quadrant-name { color: var(--do); }
  .quadrant[data-quadrant="schedule"] .quadrant-name { color: var(--schedule); }
  .quadrant[data-quadrant="delegate"] .quadrant-name { color: var(--delegate); }
  .quadrant[data-quadrant="eliminate"] .quadrant-name { color: var(--eliminate); }

  .quadrant-subtitle {
    font-size: 10px;
    color: var(--text-dim);
    font-weight: 500;
  }

  .quadrant-count {
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 600;
    background: rgba(255,255,255,0.04);
    padding: 2px 8px;
    border-radius: 20px;
  }

  /* Task input */
  .task-input-row {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
  }

  .task-input {
    flex: 1;
    padding: 8px 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid transparent;
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    outline: none;
    transition: all 0.2s;
  }

  .task-input::placeholder { color: var(--text-dim); }
  .task-input:focus { border-color: var(--accent); background: rgba(124, 92, 252, 0.06); }

  .add-btn {
    width: 34px;
    height: 34px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.04);
    color: var(--text-dim);
    border-radius: 8px;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .add-btn:hover {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
    transform: scale(1.05);
  }

  /* Task list */
  .task-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-height: 40px;
  }

  /* Task card */
  .task-card {
    padding: 10px 12px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 10px;
    cursor: grab;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
    animation: slideIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-10px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .task-card:hover {
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.1);
    transform: translateX(3px);
  }

  .task-card.dragging {
    opacity: 0.4;
    transform: scale(0.95);
  }

  .task-card.completed .task-text {
    text-decoration: line-through;
    opacity: 0.4;
  }

  .task-checkbox {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid var(--text-dim);
    cursor: pointer;
    transition: all 0.3s;
    flex-shrink: 0;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .task-checkbox:hover {
    border-color: var(--accent);
    transform: scale(1.15);
  }

  .task-checkbox.checked {
    background: var(--accent);
    border-color: var(--accent);
    animation: checkPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .task-checkbox.checked::after {
    content: '';
    width: 6px;
    height: 6px;
    background: white;
    border-radius: 50%;
  }

  @keyframes checkPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.4); }
    100% { transform: scale(1); }
  }

  .task-text {
    flex: 1;
    font-size: 13px;
    font-weight: 400;
    line-height: 1.4;
    transition: all 0.3s;
  }

  .task-delete {
    opacity: 0;
    width: 22px;
    height: 22px;
    border: none;
    background: rgba(255, 77, 106, 0.1);
    color: var(--do);
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .task-card:hover .task-delete { opacity: 1; }
  .task-delete:hover { background: var(--do); color: white; transform: scale(1.1); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 20px 10px;
    color: var(--text-dim);
    font-size: 12px;
    opacity: 0.5;
  }

  /* Summary Modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.2s;
  }

  .modal-backdrop.active { display: flex; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    max-width: 560px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
    animation: modalSlide 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes modalSlide {
    from { opacity: 0; transform: translateY(20px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .modal h2 {
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 24px;
    letter-spacing: -0.5px;
  }

  .modal-section {
    margin-bottom: 20px;
  }

  .modal-section-title {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .modal-section[data-q="do"] .modal-section-title { color: var(--do); }
  .modal-section[data-q="schedule"] .modal-section-title { color: var(--schedule); }
  .modal-section[data-q="delegate"] .modal-section-title { color: var(--delegate); }
  .modal-section[data-q="eliminate"] .modal-section-title { color: var(--eliminate); }

  .modal-task {
    padding: 6px 0;
    font-size: 13px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .modal-task::before {
    content: '';
    width: 5px;
    height: 5px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .modal-section[data-q="do"] .modal-task::before { background: var(--do); }
  .modal-section[data-q="schedule"] .modal-task::before { background: var(--schedule); }
  .modal-section[data-q="delegate"] .modal-task::before { background: var(--delegate); }
  .modal-section[data-q="eliminate"] .modal-task::before { background: var(--eliminate); }

  .modal-empty {
    font-size: 12px;
    color: var(--text-dim);
    font-style: italic;
  }

  .modal-close {
    margin-top: 16px;
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .modal-close:hover { filter: brightness(1.15); transform: translateY(-1px); }

  /* Confetti canvas */
  #confetti {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 200;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface);
    border: 1px solid var(--accent);
    color: var(--text);
    padding: 12px 24px;
    border-radius: 12px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    z-index: 300;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 8px 30px rgba(124, 92, 252, 0.2);
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Responsive */
  @media (max-width: 700px) {
    .matrix { grid-template-columns: 1fr; }
    .axis-labels { display: none; }
    .quadrant { min-height: 160px; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  /* Reset confirm dialog */
  .confirm-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 150;
    display: none;
    align-items: center;
    justify-content: center;
  }

  .confirm-backdrop.active { display: flex; }

  .confirm-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    text-align: center;
    animation: modalSlide 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .confirm-box p { margin-bottom: 20px; font-size: 14px; }
  .confirm-box .btn-row { display: flex; gap: 10px; justify-content: center; }
  .confirm-box .btn { padding: 10px 24px; border-radius: 10px; font-weight: 600; }
  .btn-confirm-danger { background: var(--do) !important; border-color: var(--do) !important; color: white !important; }
  .btn-confirm-danger:hover { filter: brightness(1.15); }
</style>
</head>
<body>
<canvas id="confetti"></canvas>

<div class="app">
  <header>
    <div class="logo">
      <div class="logo-icon"><span></span><span></span><span></span><span></span></div>
      <div>
        <h1>Eisenhower Matrix</h1>
        <div style="font-size:11px;color:var(--text-dim);font-weight:500;margin-top:2px">Prioritize what matters</div>
      </div>
    </div>
    <div class="header-stats">
      <div class="stat">
        <div class="stat-value" id="totalTasks">0</div>
        <div class="stat-label">Tasks</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="completedTasks">0</div>
        <div class="stat-label">Done</div>
      </div>
      <div class="stat">
        <div class="stat-value"><span class="streak-flame" id="streakDisplay">0</span></div>
        <div class="stat-label">Streak</div>
      </div>
    </div>
  </header>

  <div class="actions">
    <button class="btn" onclick="showSummary()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6m-6 4h4"/></svg>
      Action List
    </button>
    <button class="btn" onclick="exportText()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14m-7-7l7 7 7-7"/></svg>
      Copy to Clipboard
    </button>
    <button class="btn btn-danger" onclick="confirmReset()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m-1 0v12a2 2 0 01-2 2H9a2 2 0 01-2-2V6h10z"/></svg>
      Reset All
    </button>
  </div>

  <div class="axis-labels">
    <div class="axis-label">Urgent</div>
    <div class="axis-label">Not Urgent</div>
  </div>

  <div class="matrix">
    <div class="quadrant" data-quadrant="do" id="q-do">
      <div class="quadrant-header">
        <div class="quadrant-title">
          <div class="quadrant-dot"></div>
          <div>
            <div class="quadrant-name">Do First</div>
            <div class="quadrant-subtitle">Urgent & Important</div>
          </div>
        </div>
        <div class="quadrant-count" id="count-do">0</div>
      </div>
      <div class="task-input-row">
        <input class="task-input" placeholder="Add a task..." data-quadrant="do" onkeydown="if(event.key==='Enter')addTask(this)">
        <button class="add-btn" onclick="addTask(this.previousElementSibling)">+</button>
      </div>
      <div class="task-list" id="list-do"></div>
    </div>

    <div class="quadrant" data-quadrant="schedule" id="q-schedule">
      <div class="quadrant-header">
        <div class="quadrant-title">
          <div class="quadrant-dot"></div>
          <div>
            <div class="quadrant-name">Schedule</div>
            <div class="quadrant-subtitle">Not Urgent & Important</div>
          </div>
        </div>
        <div class="quadrant-count" id="count-schedule">0</div>
      </div>
      <div class="task-input-row">
        <input class="task-input" placeholder="Add a task..." data-quadrant="schedule" onkeydown="if(event.key==='Enter')addTask(this)">
        <button class="add-btn" onclick="addTask(this.previousElementSibling)">+</button>
      </div>
      <div class="task-list" id="list-schedule"></div>
    </div>

    <div class="quadrant" data-quadrant="delegate" id="q-delegate">
      <div class="quadrant-header">
        <div class="quadrant-title">
          <div class="quadrant-dot"></div>
          <div>
            <div class="quadrant-name">Delegate</div>
            <div class="quadrant-subtitle">Urgent & Not Important</div>
          </div>
        </div>
        <div class="quadrant-count" id="count-delegate">0</div>
      </div>
      <div class="task-input-row">
        <input class="task-input" placeholder="Add a task..." data-quadrant="delegate" onkeydown="if(event.key==='Enter')addTask(this)">
        <button class="add-btn" onclick="addTask(this.previousElementSibling)">+</button>
      </div>
      <div class="task-list" id="list-delegate"></div>
    </div>

    <div class="quadrant" data-quadrant="eliminate" id="q-eliminate">
      <div class="quadrant-header">
        <div class="quadrant-title">
          <div class="quadrant-dot"></div>
          <div>
            <div class="quadrant-name">Eliminate</div>
            <div class="quadrant-subtitle">Not Urgent & Not Important</div>
          </div>
        </div>
        <div class="quadrant-count" id="count-eliminate">0</div>
      </div>
      <div class="task-input-row">
        <input class="task-input" placeholder="Add a task..." data-quadrant="eliminate" onkeydown="if(event.key==='Enter')addTask(this)">
        <button class="add-btn" onclick="addTask(this.previousElementSibling)">+</button>
      </div>
      <div class="task-list" id="list-eliminate"></div>
    </div>
  </div>
</div>

<!-- Summary Modal -->
<div class="modal-backdrop" id="summaryModal">
  <div class="modal">
    <h2>Your Action Plan</h2>
    <div id="summaryContent"></div>
    <button class="modal-close" onclick="closeSummary()">Got It</button>
  </div>
</div>

<!-- Confirm Reset -->
<div class="confirm-backdrop" id="confirmDialog">
  <div class="confirm-box">
    <p>Clear all tasks? This can't be undone.</p>
    <div class="btn-row">
      <button class="btn" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-confirm-danger" onclick="resetAll()">Reset Everything</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ============ DATA ============
const QUADRANTS = ['do', 'schedule', 'delegate', 'eliminate'];
const LABELS = { do: 'Do First', schedule: 'Schedule', delegate: 'Delegate', eliminate: 'Eliminate' };
let tasks = {};
let completedCount = 0;
let streak = 0;

function loadData() {
  try {
    const saved = JSON.parse(localStorage.getItem('eisenhower_tasks'));
    if (saved) tasks = saved;
    else QUADRANTS.forEach(q => tasks[q] = []);
  } catch {
    QUADRANTS.forEach(q => tasks[q] = []);
  }
  completedCount = parseInt(localStorage.getItem('eisenhower_completed') || '0');
  streak = parseInt(localStorage.getItem('eisenhower_streak') || '0');

  // Check streak (daily)
  const lastDate = localStorage.getItem('eisenhower_last_date');
  const today = new Date().toDateString();
  if (lastDate && lastDate !== today) {
    const diff = (new Date(today) - new Date(lastDate)) / 86400000;
    if (diff > 1) { streak = 0; localStorage.setItem('eisenhower_streak', '0'); }
  }
}

function saveData() {
  localStorage.setItem('eisenhower_tasks', JSON.stringify(tasks));
  localStorage.setItem('eisenhower_completed', completedCount);
  localStorage.setItem('eisenhower_streak', streak);
}

// ============ RENDERING ============
function render() {
  let total = 0;
  QUADRANTS.forEach(q => {
    const list = document.getElementById('list-' + q);
    const count = document.getElementById('count-' + q);
    list.innerHTML = '';
    const items = tasks[q] || [];
    count.textContent = items.length;
    total += items.length;

    if (items.length === 0) {
      list.innerHTML = '<div class="empty-state">Drop tasks here</div>';
      return;
    }

    items.forEach((task, i) => {
      const card = document.createElement('div');
      card.className = 'task-card' + (task.done ? ' completed' : '');
      card.draggable = true;
      card.dataset.quadrant = q;
      card.dataset.index = i;

      card.innerHTML = `
        <div class="task-checkbox${task.done ? ' checked' : ''}" onclick="toggleTask('${q}', ${i})"></div>
        <span class="task-text">${escapeHtml(task.text)}</span>
        <button class="task-delete" onclick="deleteTask('${q}', ${i})">&#10005;</button>
      `;

      // Drag events
      card.addEventListener('dragstart', onDragStart);
      card.addEventListener('dragend', onDragEnd);

      // Touch drag support
      card.addEventListener('touchstart', onTouchStart, { passive: false });
      card.addEventListener('touchmove', onTouchMove, { passive: false });
      card.addEventListener('touchend', onTouchEnd);

      list.appendChild(card);
    });
  });

  document.getElementById('totalTasks').textContent = total;
  document.getElementById('completedTasks').textContent = completedCount;
  document.getElementById('streakDisplay').textContent = streak;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ============ TASK ACTIONS ============
function addTask(input) {
  const text = input.value.trim();
  if (!text) return;
  const q = input.dataset.quadrant;
  if (!tasks[q]) tasks[q] = [];
  tasks[q].push({ text, done: false });
  input.value = '';
  saveData();
  render();

  // Haptic-like feedback
  input.style.transform = 'scale(1.02)';
  setTimeout(() => input.style.transform = '', 150);
}

function deleteTask(q, i) {
  const list = document.getElementById('list-' + q);
  const card = list.children[i];
  if (card) {
    card.style.transform = 'translateX(50px) scale(0.8)';
    card.style.opacity = '0';
    setTimeout(() => {
      tasks[q].splice(i, 1);
      saveData();
      render();
    }, 200);
  }
}

function toggleTask(q, i) {
  tasks[q][i].done = !tasks[q][i].done;
  if (tasks[q][i].done) {
    completedCount++;
    // Update streak
    const today = new Date().toDateString();
    const lastDate = localStorage.getItem('eisenhower_last_date');
    if (lastDate !== today) {
      streak++;
      localStorage.setItem('eisenhower_last_date', today);
    }
    saveData();
    render();
    burstConfetti();
    showToast('Task completed! Keep going!');
  } else {
    saveData();
    render();
  }
}

// ============ DRAG & DROP ============
let dragData = null;

function onDragStart(e) {
  const card = e.target.closest('.task-card');
  dragData = { quadrant: card.dataset.quadrant, index: parseInt(card.dataset.index) };
  card.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', '');
}

function onDragEnd(e) {
  e.target.closest('.task-card')?.classList.remove('dragging');
  document.querySelectorAll('.quadrant').forEach(q => q.classList.remove('drag-over'));
  dragData = null;
}

// Quadrant drop zones
document.querySelectorAll('.quadrant').forEach(quadrant => {
  quadrant.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    quadrant.classList.add('drag-over');
  });

  quadrant.addEventListener('dragleave', () => {
    quadrant.classList.remove('drag-over');
  });

  quadrant.addEventListener('drop', e => {
    e.preventDefault();
    quadrant.classList.remove('drag-over');
    if (!dragData) return;

    const targetQ = quadrant.dataset.quadrant;
    const sourceQ = dragData.quadrant;
    const sourceI = dragData.index;

    if (sourceQ === targetQ) return;

    const task = tasks[sourceQ].splice(sourceI, 1)[0];
    tasks[targetQ].push(task);
    saveData();
    render();
    showToast(`Moved to ${LABELS[targetQ]}`);
  });
});

// ============ TOUCH DRAG SUPPORT ============
let touchDragEl = null;
let touchClone = null;
let touchData = null;

function onTouchStart(e) {
  const card = e.target.closest('.task-card');
  if (!card || e.target.closest('.task-checkbox') || e.target.closest('.task-delete')) return;

  touchData = { quadrant: card.dataset.quadrant, index: parseInt(card.dataset.index) };
  touchDragEl = card;

  // Long press to start drag
  card._touchTimer = setTimeout(() => {
    card.classList.add('dragging');
    touchClone = card.cloneNode(true);
    touchClone.style.position = 'fixed';
    touchClone.style.pointerEvents = 'none';
    touchClone.style.zIndex = '1000';
    touchClone.style.width = card.offsetWidth + 'px';
    touchClone.style.opacity = '0.85';
    touchClone.style.transform = 'scale(1.05)';
    touchClone.style.boxShadow = '0 10px 40px rgba(0,0,0,0.4)';
    document.body.appendChild(touchClone);

    const touch = e.touches[0];
    touchClone.style.left = (touch.clientX - card.offsetWidth / 2) + 'px';
    touchClone.style.top = (touch.clientY - 20) + 'px';
  }, 200);
}

function onTouchMove(e) {
  if (!touchClone) return;
  e.preventDefault();
  const touch = e.touches[0];
  touchClone.style.left = (touch.clientX - touchClone.offsetWidth / 2) + 'px';
  touchClone.style.top = (touch.clientY - 20) + 'px';

  // Highlight quadrant under finger
  document.querySelectorAll('.quadrant').forEach(q => q.classList.remove('drag-over'));
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  const quad = el?.closest('.quadrant');
  if (quad) quad.classList.add('drag-over');
}

function onTouchEnd(e) {
  clearTimeout(touchDragEl?._touchTimer);

  if (touchClone && touchData) {
    const touch = e.changedTouches[0];
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    const targetQuad = el?.closest('.quadrant');

    if (targetQuad) {
      const targetQ = targetQuad.dataset.quadrant;
      const sourceQ = touchData.quadrant;
      if (sourceQ !== targetQ) {
        const task = tasks[sourceQ].splice(touchData.index, 1)[0];
        tasks[targetQ].push(task);
        saveData();
        render();
        showToast(`Moved to ${LABELS[targetQ]}`);
      }
    }

    touchClone.remove();
  }

  touchDragEl?.classList.remove('dragging');
  document.querySelectorAll('.quadrant').forEach(q => q.classList.remove('drag-over'));
  touchClone = null;
  touchDragEl = null;
  touchData = null;
}

// ============ SUMMARY ============
function showSummary() {
  const container = document.getElementById('summaryContent');
  const order = ['do', 'schedule', 'delegate', 'eliminate'];
  const orderLabels = {
    do: '1. Do First - Tackle these NOW',
    schedule: '2. Schedule - Plan time for these',
    delegate: '3. Delegate - Hand these off',
    eliminate: '4. Eliminate - Drop these guilt-free'
  };

  let html = '';
  order.forEach(q => {
    const items = (tasks[q] || []).filter(t => !t.done);
    html += `<div class="modal-section" data-q="${q}">
      <div class="modal-section-title">${orderLabels[q]}</div>`;
    if (items.length === 0) {
      html += `<div class="modal-empty">No pending tasks</div>`;
    } else {
      items.forEach(t => {
        html += `<div class="modal-task">${escapeHtml(t.text)}</div>`;
      });
    }
    html += '</div>';
  });

  container.innerHTML = html;
  document.getElementById('summaryModal').classList.add('active');
}

function closeSummary() {
  document.getElementById('summaryModal').classList.remove('active');
}

// ============ EXPORT ============
function exportText() {
  const order = ['do', 'schedule', 'delegate', 'eliminate'];
  const titles = {
    do: 'DO FIRST (Urgent & Important)',
    schedule: 'SCHEDULE (Not Urgent & Important)',
    delegate: 'DELEGATE (Urgent & Not Important)',
    eliminate: 'ELIMINATE (Not Urgent & Not Important)'
  };

  let text = 'EISENHOWER MATRIX\n' + '='.repeat(40) + '\n\n';
  order.forEach(q => {
    text += titles[q] + '\n' + '-'.repeat(35) + '\n';
    const items = (tasks[q] || []).filter(t => !t.done);
    if (items.length === 0) text += '  (empty)\n';
    else items.forEach((t, i) => text += `  ${i + 1}. ${t.text}\n`);
    text += '\n';
  });

  navigator.clipboard.writeText(text).then(() => {
    showToast('Copied to clipboard!');
  }).catch(() => {
    showToast('Could not copy - check permissions');
  });
}

// ============ RESET ============
function confirmReset() {
  document.getElementById('confirmDialog').classList.add('active');
}

function closeConfirm() {
  document.getElementById('confirmDialog').classList.remove('active');
}

function resetAll() {
  QUADRANTS.forEach(q => tasks[q] = []);
  saveData();
  render();
  closeConfirm();
  showToast('All tasks cleared');
}

// ============ TOAST ============
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => toast.classList.remove('show'), 2500);
}

// ============ CONFETTI ============
const confettiCanvas = document.getElementById('confetti');
const ctx = confettiCanvas.getContext('2d');
let particles = [];
let confettiRunning = false;

function resizeCanvas() {
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function burstConfetti() {
  const colors = ['#ff4d6a', '#ffb347', '#4dc9f6', '#7c5cfc', '#a78bfa', '#34d399', '#fbbf24'];
  for (let i = 0; i < 50; i++) {
    particles.push({
      x: Math.random() * confettiCanvas.width,
      y: confettiCanvas.height + 10,
      vx: (Math.random() - 0.5) * 8,
      vy: -(Math.random() * 14 + 6),
      color: colors[Math.floor(Math.random() * colors.length)],
      size: Math.random() * 6 + 3,
      rotation: Math.random() * 360,
      rotSpeed: (Math.random() - 0.5) * 10,
      life: 1,
      decay: 0.012 + Math.random() * 0.008
    });
  }
  if (!confettiRunning) {
    confettiRunning = true;
    animateConfetti();
  }
}

function animateConfetti() {
  ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.25;
    p.rotation += p.rotSpeed;
    p.life -= p.decay;

    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rotation * Math.PI / 180);
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
    ctx.restore();
  });

  particles = particles.filter(p => p.life > 0);
  if (particles.length > 0) requestAnimationFrame(animateConfetti);
  else confettiRunning = false;
}

// ============ INIT ============
loadData();
render();

// Close modals on backdrop click
document.getElementById('summaryModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeSummary();
});
document.getElementById('confirmDialog').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeConfirm();
});

// Keyboard shortcut: Escape closes modals
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeSummary(); closeConfirm(); }
});
</script>
</body>
</html>
